# Agent OS Standards Index

global:
  coupling-cohesion:
    description: Low coupling and high cohesion — minimize inter-module dependencies; each module does one thing well
  delegation:
    description: Delegation pattern — an object forwards a request to a helper rather than handling it directly
  dry:
    description: DRY is about eliminating knowledge duplication, not textual repetition — one authoritative source per concept
  gang-of-four:
    description: 23 classic OO design patterns (creational, structural, behavioral) from Gamma et al.
  hexagonal-architecture:
    description: Ports-and-adapters — isolate domain logic from infrastructure and UI behind narrow interface boundaries
  object-interaction:
    description: Law of Demeter and Tell-Don't-Ask — tell collaborators what to do; don't query their internals
  progressive-enhancement:
    description: Build a working core first, then layer enhancements — graceful degradation under minimal conditions
  simplicity:
    description: Simplicity as active discipline — fewest moving parts, maximum clarity, resist speculative complexity
  solid:
    description: SOLID principles — Single Responsibility, Open/Closed, Liskov, Interface Segregation, Dependency Inversion
  tdd-workflow:
    description: Red-green-refactor TDD loop — write a failing test first, make it pass, then clean up
  value-objects:
    description: Value objects — identity defined by value not reference; immutable, equality by content

clipboard:
  pasteboard:
    description: NSPasteboard write pattern — usedEncoding for emoji/Windows/UTF-16 files, setString not setData

logging:
  patterns:
    description: Always-on OSLog at .debug level — no config toggle, stripped from release builds automatically

macos:
  services:
    description: NSServices (macOS 13-25) and FinderSync extension (macOS 26+) wiring, registration, and handler patterns
